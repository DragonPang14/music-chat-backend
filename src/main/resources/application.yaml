spring:
  application:
    name: music-chat-backend
  datasource:
    url: jdbc:h2:mem:music_chat_db
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

music:
  api:
    url: https://music-api.gdstudio.xyz/api.php